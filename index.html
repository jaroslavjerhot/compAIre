<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>compAIre</title>
  <!-- Bootstrap 5 Dark Theme -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <link rel="icon" href="img/ic_cAI_16.png" type="image/png">
  </head>
<body>
  <div class="container py-4">

    <!-- Logo -->
    <div class="logo mb-3 text-center"><img src="img/logo_mobile_60.png" alt="compAIre Logo"></div>

    <!-- Title and Favicons Row -->
    <div class="d-flex align-items-center mb-4">
      <h2 class="me-3 mb-0"></h2>
      
    </div>

    <!-- Textarea and Model Selection -->
    <div class="card p-3 mb-3">
      <div class="mb-3">
        <!-- <label for="userInput" class="form-label">Otázka:</label> -->
      <div class="d-flex align-items-start gap-2">
        <button id="micBtn" type="button" class="btn btn-outline-light">
            <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
              <path fill="currentColor" d="M12 14a3 3 0 0 0 3-3V7a3 3 0 1 0-6 0v4a3 3 0 0 0 3 3Zm5-3a1 1 0 1 1 2 0a7 7 0 0 1-6 6.93V21h3a1 1 0 1 1 0 2H8a1 1 0 1 1 0-2h3v-3.07A7 7 0 0 1 5 11a1 1 0 1 1 2 0a5 5 0 0 0 10 0Z"/>
            </svg>
        </button>
        &nbsp;
        <textarea id="userInput" class="form-control" rows="1"></textarea>
      </div>
      </div>
      <div class="mb-3">
        <label for="modelSelect" class="form-label">Vyber model:</label>
        <select class="form-select" id="modelSelect">
        </select>
      </div>
      <button class="btn btn-primary" id="askBtn">Zeptej se</button>
    </div>

    <!-- Answer and Price -->
    <div class="card p-3">
      <div class="mt-2"><strong>Odpověď, cena a doba: </strong><span id="price">0.00</span></div>
      <div class="answer-box" id="answerBox"></div>

    </div>

  </div>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  
  <!-- JS for Demo -->

    <script src="js/base.js"></script>
    <script src="js/app.js"></script>
    <script src="js/speech.js"></script>
    <script src="js/arrows.js"></script>
</body>
</html>
